<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - College Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Student Profile</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Personal Information</h2>
            <form action="#">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" value="John Doe" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" value="johndoe@example.com" required>

                <label for="contact">Contact Number:</label>
                <input type="tel" id="contact" name="contact" value="123-456-7890" required>

                <label for="address">Address:</label>
                <textarea id="address" name="address" rows="4" required>123 Main St, City, Country</textarea>

                <button type="submit">Update Profile</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 College Management System</p>
    </footer>
</body>
</html>
